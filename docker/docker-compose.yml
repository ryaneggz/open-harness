services:
  sandbox:
    container_name: ${NAME}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../workspace:/home/sandbox/workspace
      - ../config:/home/sandbox/config
    stdin_open: true
    tty: true
    environment:
      - HEARTBEAT_ACTIVE_START=${HEARTBEAT_ACTIVE_START:-}
      - HEARTBEAT_ACTIVE_END=${HEARTBEAT_ACTIVE_END:-}
      - HEARTBEAT_AGENT=${HEARTBEAT_AGENT:-claude}
      - MOM_SLACK_APP_TOKEN=${MOM_SLACK_APP_TOKEN:-}
      - MOM_SLACK_BOT_TOKEN=${MOM_SLACK_BOT_TOKEN:-}
