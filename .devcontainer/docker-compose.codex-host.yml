# Codex Host Auth Mount Overlay
# ==============================
# Purpose: Bind-mount the host's ~/.codex directory into the sandbox, so
# the sandboxed codex CLI inherits host OAuth tokens, session history,
# memories, and config. Developers running multiple sandboxes no longer
# re-authenticate codex per sandbox.
#
# One mount, one concern:
#   - ~/.codex/ (dir) — auth.json (OAuth tokens), config.toml, sessions,
#                       memories, history, rules, plugins, caches
#
# Unlike claude, codex has no sidecar ~/.codex.json file — all state lives
# under the directory.
#
# Pre-flight:
#   $HOST_CODEX_DIR (default ~/.codex) must exist as a directory.
# If the target is missing, Docker auto-creates it as a directory owned
# by root — `codex` then fails to read/write auth.json.
#
# Requirements: Host UID MUST equal the orchestrator UID (1000). The
# ~/.codex/auth.json file is mode 0600 (owner-only), so the
# group-membership trick used elsewhere in entrypoint.sh does NOT grant
# access. If host UID ≠ 1000, `codex` will fail to read credentials
# despite the bind-mount succeeding.
#
# Security tradeoff: this mounts OAuth credentials and session history
# into a container that may execute untrusted agent code. Enable only for
# trusted workflows. OAuth login is the expected default auth path for
# codex in this harness, so the overlay is enabled by default in
# .openharness/config.json.
#
# Bleed-through: ~/.codex/sessions/, history.jsonl, and memories/ from
# other host work will be visible inside the sandbox. Acknowledged cost
# of full-mount convenience.
#
# Permissions: Read-write (sandbox writes host sessions/memories live).
# Replaces: codex-auth named volume from base docker-compose.yml at the
# /home/orchestrator/.codex target path. The named volume declaration stays
# in the base compose — it becomes orphaned (unmounted) while this
# overlay is active and is reinstated when the overlay is removed.
#
# Entrypoint coordination: sets CODEX_HOST_BIND_MOUNT=1 so entrypoint.sh
# skips its recursive chown on /home/orchestrator/.codex (which would otherwise
# rewrite host file ownership).
#
# Usage: enable via .openharness/config.json composeOverrides[]:
#   ".devcontainer/docker-compose.codex-host.yml"

services:
  sandbox:
    volumes:
      - ${HOST_CODEX_DIR:-~/.codex}:/home/orchestrator/.codex
    environment:
      - CODEX_HOST_BIND_MOUNT=1
