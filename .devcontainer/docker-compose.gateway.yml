# Gateway Overlay (opt-in)
# =========================
# Purpose: Runs a Caddy sidecar that routes to sandbox apps over the docker
# network. `oh expose <name> <port>` regenerates `.openharness/Caddyfile`
# (bind-mounted below) and reloads Caddy via its admin API (zero downtime).
#
# Mode-aware:
#   - Laptop (no PUBLIC_DOMAIN): tls internal on *.localhost, port 8443 on host.
#   - Remote (PUBLIC_DOMAIN set): ACME via :80/:443, or Cloudflare named tunnel
#     (see future docker-compose.cloudflared-named.yml overlay).
#
# Activated by `openharness expose <name> <port>` adding this file to
# .openharness/config.json composeOverrides.
#
# Invariants (see .claude/rules/gateway-routing.md):
#   - Admin API bound to 127.0.0.1 only. Never expose :2019 to the world.
#   - Sandbox service name is reachable from Caddy via docker DNS.

services:
  gateway:
    image: caddy:2-alpine
    container_name: ${SANDBOX_NAME:-openharness}-gateway
    depends_on:
      - sandbox
    volumes:
      - ../.openharness/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "127.0.0.1:2019:2019"
      - "8443:443"
      - "8088:80"
    environment:
      - SANDBOX_NAME=${SANDBOX_NAME:-openharness}
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN:-}
      - ACME_EMAIL=${ACME_EMAIL:-}
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
