# Pi Host Auth Mount Overlay
# ============================
# Purpose: Bind-mount the host's ~/.pi directory into the sandbox, so the
# sandboxed `pi` / `oh` CLI inherits host OAuth tokens, agent identities,
# and session state. Developers running multiple sandboxes no longer
# re-authenticate Pi Agent per sandbox.
#
# One mount, one concern:
#   - ~/.pi/ (dir) — agent/auth.json (OAuth tokens), slack/auth.json,
#                    identities, sessions
#
# Pre-flight:
#   $HOST_PI_DIR (default ~/.pi) must exist as a directory.
# If the target is missing, Docker auto-creates it as a directory owned
# by root — `pi` then fails to read/write auth.json.
#
# Requirements: Host UID MUST equal the orchestrator UID (1000). Pi's
# auth.json files are mode 0600 (owner-only), so the group-membership
# trick used elsewhere in entrypoint.sh does NOT grant access. If host
# UID ≠ 1000, `pi` will fail to read credentials despite the bind-mount
# succeeding.
#
# Security tradeoff: this mounts OAuth credentials and session history
# into a container that may execute untrusted agent code. Enable only
# for trusted workflows. OAuth login is the expected default auth path
# for pi in this harness, so the overlay is enabled by default in
# .openharness/config.json.
#
# Bleed-through: sessions, identities, and Slack linkage from other host
# work will be visible inside the sandbox. Acknowledged cost of
# full-mount convenience.
#
# Permissions: Read-write (sandbox writes host sessions live).
# Replaces: pi-auth named volume from base docker-compose.yml at the
# /home/orchestrator/.pi target path. The named volume declaration stays in
# the base compose — it becomes orphaned (unmounted) while this overlay
# is active and is reinstated when the overlay is removed.
#
# Entrypoint coordination: sets PI_HOST_BIND_MOUNT=1 so entrypoint.sh
# skips its recursive chown on /home/orchestrator/.pi (which would otherwise
# rewrite host file ownership).
#
# Usage: enable via .openharness/config.json composeOverrides[]:
#   ".devcontainer/docker-compose.pi-host.yml"

services:
  sandbox:
    volumes:
      - ${HOST_PI_DIR:-~/.pi}:/home/orchestrator/.pi
    environment:
      - PI_HOST_BIND_MOUNT=1
