name: "CI: Conciseness Eval"

on:
  workflow_dispatch:
  push:
    paths:
      - "workspace/*.md"
      - "workspace/.claude/rules/*.md"
      - ".github/workflows/conciseness.yml"
  pull_request:
    paths:
      - "workspace/*.md"
      - "workspace/.claude/rules/*.md"

permissions:
  contents: read

jobs:
  conciseness:
    name: Score file conciseness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Eval filler-word density
        run: |
          fail=0
          total=0
          pass=0
          threshold=2  # max 2% filler density

          # Filler patterns (word-boundary, case-insensitive)
          # Articles + filler + hedging + pleasantries + verbose phrases
          filler_pattern='\b(a|an|the|just|really|basically|simply|actually|essentially|generally|typically|usually|normally|might|perhaps|please|importantly)\b|note that|keep in mind|in order to|make sure to|you should|it is important to|could potentially|it seems like|you may want to'

          # Strip code blocks, YAML frontmatter, and table separators before scanning
          strip_non_prose() {
            local file="$1"
            awk '
              /^---$/ && !in_yaml && NR <= 2 { in_yaml=1; next }
              /^---$/ && in_yaml { in_yaml=0; next }
              in_yaml { next }
              /^```/ { in_code=!in_code; next }
              in_code { next }
              /^\| *---/ { next }
              /^[[:space:]]*`[^`]+`[[:space:]]*$/ { next }
              { gsub(/`[^`]+`/, ""); gsub(/https?:\/\/[^ ]+/, ""); print }
            ' "$file"
          }

          echo "## Conciseness Eval"
          echo ""
          echo "| File | Words | Filler Hits | Density% | Gate |"
          echo "|------|-------|-------------|----------|------|"

          # Scan identity files
          for file in workspace/AGENTS.md workspace/SOUL.md workspace/TOOLS.md workspace/USER.md workspace/HEARTBEAT.md; do
            [ -f "$file" ] || continue
            label="$(basename "$file" .md)"

            prose=$(strip_non_prose "$file")
            word_count=$(echo "$prose" | wc -w | tr -d ' ')

            if [ "$word_count" -eq 0 ]; then
              echo "| $label | 0 | 0 | 0 | SKIP |"
              continue
            fi

            filler_count=$(echo "$prose" | grep -oiE "$filler_pattern" | wc -l | tr -d ' ')
            density=$(( filler_count * 100 / word_count ))
            total=$((total + 1))

            if [ "$density" -le "$threshold" ]; then
              echo "| $label | $word_count | $filler_count | $density% | PASS |"
              pass=$((pass + 1))
            else
              echo "| $label | $word_count | $filler_count | $density% | FAIL |"
              fail=$((fail + 1))
            fi
          done

          # Scan rules files (exclude non-compressed files)
          for file in workspace/.claude/rules/*.md; do
            [ -f "$file" ] || continue
            name="$(basename "$file" .md)"

            # Skip files that are never compressed
            case "$name" in
              token-conservation) continue ;;
            esac

            label="rules/$name"
            prose=$(strip_non_prose "$file")
            word_count=$(echo "$prose" | wc -w | tr -d ' ')

            if [ "$word_count" -eq 0 ]; then
              echo "| $label | 0 | 0 | 0 | SKIP |"
              continue
            fi

            filler_count=$(echo "$prose" | grep -oiE "$filler_pattern" | wc -l | tr -d ' ')
            density=$(( filler_count * 100 / word_count ))
            total=$((total + 1))

            if [ "$density" -le "$threshold" ]; then
              echo "| $label | $word_count | $filler_count | $density% | PASS |"
              pass=$((pass + 1))
            else
              echo "| $label | $word_count | $filler_count | $density% | FAIL |"
              fail=$((fail + 1))
            fi
          done

          echo ""
          echo "--- Summary ---"
          echo "Total: $total | Passed: $pass | Failed: $fail"

          if [ "$fail" -gt 0 ]; then
            echo "Conciseness check failed. Run /compress to reduce filler density."
            exit 1
          fi

          echo "All files meet conciseness thresholds."
