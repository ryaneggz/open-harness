name: Release

permissions:
  contents: write
  packages: write

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9]*.[0-9]*"

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse tag
        id: parse
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ steps.parse.outputs.version }}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\] - ") { in_block=1; next }
            in_block && /^## \[/ { exit }
            in_block && /^---[[:space:]]*$/ { exit }
            in_block { print }
          ' CHANGELOG.md > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ] || ! grep -q '[^[:space:]]' "$NOTES_FILE"; then
            echo "Release $VERSION — see CHANGELOG.md and commit history." > "$NOTES_FILE"
          fi
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Setup Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE=ghcr.io/ryaneggz/openharness:${{ steps.parse.outputs.version }}
          LATEST=ghcr.io/ryaneggz/openharness:latest

          docker build -f .devcontainer/Dockerfile -t $IMAGE -t $LATEST .
          docker push $IMAGE
          docker push $LATEST

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.parse.outputs.version }}
          body_path: ${{ steps.notes.outputs.notes_file }}
