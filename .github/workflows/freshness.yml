name: "CI: Freshness Guard"

on:
  workflow_dispatch:
  push:
    paths:
      - "workspace/*.md"
      - "workspace/.claude/rules/*.md"
      - ".github/workflows/freshness.yml"
  pull_request:
    paths:
      - "workspace/*.md"
      - "workspace/.claude/rules/*.md"

permissions:
  contents: read

jobs:
  freshness:
    name: Check .original.md ↔ .md freshness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Audit file pair freshness
        run: |
          drift=0
          missing=0

          # Find all .original.md files under workspace/
          while IFS= read -r original; do
            # Derive compressed counterpart: strip .original from filename
            compressed="${original/.original.md/.md}"
            label="${original#workspace/}"
            label="${label%.original.md}"

            # Check both files exist
            if [ ! -f "$compressed" ]; then
              echo "MISSING_COMPRESSED: $label — $original exists but $compressed does not"
              missing=$((missing + 1))
              continue
            fi

            # Compare last-modified commit hashes
            hash_orig=$(git log -1 --format='%H' -- "$original" 2>/dev/null || echo "none")
            hash_comp=$(git log -1 --format='%H' -- "$compressed" 2>/dev/null || echo "none")

            if [ "$hash_orig" = "none" ] || [ "$hash_comp" = "none" ]; then
              echo "UNTRACKED: $label — one or both files have no git history"
              continue
            fi

            if [ "$hash_orig" != "$hash_comp" ]; then
              ts_orig=$(git log -1 --format='%ct' -- "$original")
              ts_comp=$(git log -1 --format='%ct' -- "$compressed")

              if [ "$ts_orig" -gt "$ts_comp" ]; then
                echo "DRIFTED: $label — .original.md is newer ($hash_orig vs $hash_comp). Run /compress."
              else
                echo "DRIFTED: $label — .md was edited directly ($hash_comp vs $hash_orig). Manual fix needed."
              fi
              drift=$((drift + 1))
            else
              echo "IN_SYNC: $label"
            fi
          done < <(find workspace/ -name '*.original.md' -not -path '*/node_modules/*' | sort)

          echo ""
          echo "--- Summary ---"
          echo "Drifted: $drift | Missing: $missing"

          if [ "$drift" -gt 0 ] || [ "$missing" -gt 0 ]; then
            echo "Freshness check failed."
            exit 1
          fi

          echo "All pairs in sync."
