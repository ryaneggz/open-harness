name: "CI: openharness"

on:
  push:
    branches:
      - development
      - agent/orchestrator
    paths:
      - "workspace/projects/next-app/src/**"
      - "workspace/projects/next-app/public/**"
      - "workspace/projects/next-app/package.json"
      - "workspace/projects/next-app/pnpm-lock.yaml"
      - "workspace/projects/next-app/tsconfig.json"
      - "workspace/projects/next-app/next.config.*"
      - "workspace/projects/next-app/tailwind.config.*"
      - "workspace/projects/next-app/postcss.config.*"
      - "workspace/projects/next-app/vitest.config.*"
      - "workspace/projects/next-app/playwright.config.*"
      - "workspace/projects/next-app/.prettierignore"
      - "workspace/projects/next-app/.gitignore"
      - "workspace/projects/next-app/.eslintrc*"
      - "packages/sandbox/src/**"
      - "packages/sandbox/package.json"
      - "packages/sandbox/pnpm-lock.yaml"
      - "packages/sandbox/tsconfig.json"
      - "packages/slack/src/**"
      - "packages/slack/package.json"
      - "packages/slack/pnpm-lock.yaml"
      - "packages/slack/tsconfig.json"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: workspace/projects/next-app/node_modules
          key: node-modules-${{ hashFiles('workspace/projects/next-app/pnpm-lock.yaml') }}
          restore-keys: |
            node-modules-

      - name: Install dependencies
        working-directory: workspace/projects/next-app
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: workspace/projects/next-app
        run: pnpm run lint

      - name: Format check
        working-directory: workspace/projects/next-app
        run: pnpm run format:check

      - name: Type check
        working-directory: workspace/projects/next-app
        run: pnpm run type-check

      - name: Build
        working-directory: workspace/projects/next-app
        run: pnpm run build

      - name: Test
        working-directory: workspace/projects/next-app
        run: pnpm test

      - name: Install Playwright browsers
        working-directory: workspace/projects/next-app
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        working-directory: workspace/projects/next-app
        run: pnpm run test:e2e

  test-sandbox:
    name: "Test: packages/sandbox"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        working-directory: packages/sandbox
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: packages/sandbox
        run: pnpm run build

      - name: Test
        working-directory: packages/sandbox
        run: pnpm test

  test-slack:
    name: "Test: packages/slack"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        working-directory: packages/slack
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: packages/slack
        run: pnpm run build

      - name: Test
        working-directory: packages/slack
        run: pnpm test
