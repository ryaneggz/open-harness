name: "CI: openharness"

on:
  push:
    branches:
      - development
      - agent/orchestrator
    paths:
      - "packages/sandbox/src/**"
      - "packages/sandbox/package.json"
      - "packages/sandbox/pnpm-lock.yaml"
      - "packages/sandbox/tsconfig.json"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  test-sandbox:
    name: "Test: packages/sandbox"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        working-directory: packages/sandbox
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: packages/sandbox
        run: pnpm run build

      - name: Test
        working-directory: packages/sandbox
        run: pnpm test
