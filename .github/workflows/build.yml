name: Build Sandbox

permissions:
    contents: read
    packages: write

on:
    push:
        tags:
            - "claude-v*"

jobs:
    build:
        runs-on: ubuntu-latest
        environment: Dev
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Parse tag
              id: parse
              run: |
                  # Expected tag format: claude-v<version>
                  # e.g. claude-v1.0.0
                  VERSION=${GITHUB_REF#refs/tags/claude-}
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "Version: $VERSION"

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ secrets.GHCR_USERNAME || github.actor }}
                  password: ${{ secrets.GHCR_PAT }}

            - name: Build and push
              run: |
                  IMAGE=ghcr.io/ruska-ai/sandbox:claude-${{ steps.parse.outputs.version }}
                  LATEST=ghcr.io/ruska-ai/sandbox:claude-latest

                  echo "Building: $IMAGE and $LATEST"
                  docker build -t $IMAGE -t $LATEST .
                  docker push $IMAGE
                  docker push $LATEST
