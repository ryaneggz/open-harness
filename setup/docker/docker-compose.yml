services:
  sandbox:
    container_name: ${NAME}
    build:
      context: ${HARNESS_ROOT:-../..}
      dockerfile: setup/docker/Dockerfile
    volumes:
      - ${HOST_WORKSPACE:-../..}:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      - PROJECT_ROOT=/workspace
      - INSTALL_ROOT=/opt/open-harness/install
      - HEARTBEAT_ACTIVE_START=${HEARTBEAT_ACTIVE_START:-}
      - HEARTBEAT_ACTIVE_END=${HEARTBEAT_ACTIVE_END:-}
      - HEARTBEAT_AGENT=${HEARTBEAT_AGENT:-claude}
